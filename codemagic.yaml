workflows:
  android-workflow:
    name: ZOYA APK Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Set gradlew permission
        script: chmod +x gradlew
      - name: Build Debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
